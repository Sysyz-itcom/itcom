<!DOCTYPE HTML>
<html>
	<head>
		<title>邵阳市第一中学信息技术同好会</title>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no" />
		<link rel="stylesheet" href="assets/css/main.css" />
		<noscript><link rel="stylesheet" href="assets/css/noscript.css" /></noscript>
	</head>
	<body class="is-preload">

		<!-- Wrapper -->
			<div id="wrapper">

				<!-- Header -->
					<header id="header">
						<div class="logo">
							<span class="icon fa-gem"></span>
						</div>
						<div class="content">
							<div class="inner">
								<h1>ITCOM</h1>
								<p>邵阳市第一中学信息技术同好会</p>
								<p>Shaoyang No. 1 Middle School Information Technology Club</p>
							</div>
						</div>
					</header>

				<!-- Main -->
					<div id="main">

				<!-- Footer -->
					<footer id="footer">
						<p class="copyright">邵阳市第一中学信息技术同好会 &copy; 2023-2024</p>
						<p class="copyright"><span>本项目已在Github上运行</span><span id="timer">00天 00小时 00分钟 00秒</span></p>
					</footer>

			</div>

		<!-- BG -->
			<div id="bg">
				<canvas id="mycanvas"></canvas>
			</div>

		<!-- Scripts -->
			<script src="assets/js/jquery.min.js"></script>
			<script src="assets/js/browser.min.js"></script>
			<script src="assets/js/breakpoints.min.js"></script>
			<script src="assets/js/util.js"></script>
			<script src="assets/js/main.js"></script>
			<script>
				function updateTime() {
				const start = new Date('2024-02-08T00:00:00'); // 计时开始日期
				const now = new Date(); // 当前日期
				const diff = now - start; // 差值（毫秒）

				// 计算天数、小时、分钟和秒
				let days = Math.floor(diff / (1000 * 60 * 60 * 24));
				let hours = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
				let minutes = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
				let seconds = Math.floor((diff % (1000 * 60)) / 1000);

				// 更新页面上的计时器
				document.getElementById('timer').textContent =
				`${days}天 ${hours}小时 ${minutes}分钟 ${seconds}秒`;
				}

				// 每秒更新时间
				setInterval(updateTime, 1000);
			</script>
		        <script>
				window.onload = function() {
				var H = window.innerHeight;
				var W = window.innerWidth;
				var mycanvas = document.getElementById('mycanvas');
				var ctx = mycanvas.getContext('2d');

				// 设置画布尺寸
				mycanvas.height = H;
				mycanvas.width = W;
				
				var fontsize = 18;
				var text = [];
				var lie = Math.floor(W / fontsize);
				var str = '01';
				for (var i = 0; i < lie; i++) {
				text.push(0);
				}
				ctx.font = fontsize + 'px 微雅软黑';

				function draw() {
				ctx.fillStyle = 'rgba(0,0,0,0.08)';
				ctx.fillRect(0, 0, W, H);
				ctx.fillStyle = randColor();
				for (var i = 0; i < lie; i++) {
				var index = Math.floor(Math.random() * str.length);
				var x = Math.floor(fontsize * i);
				var y = text[i] * fontsize;
				ctx.fillText(str[index], x, y);
				if (y > H && Math.random() > 0.99) {
				text[i] = 0;
				}
				text[i]++;
				}
			}

				function randColor() {
				return 'rgb(127, 255, 0)';
				}

				var timer = setInterval(function() {
			        draw();
				}, 1000 / 30);
			  };
			</script>

	</body>
</html>
