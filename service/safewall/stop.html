<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>请求可疑</title>
    <style>
      @media screen and (max-width: 768px) {
          .info-box {
            width: 100%;
           }
        }
      
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: write; /* 设置背景颜色为绿色 */
        }

        body {
            user-select: none; /* 禁止文字选择 */
            -webkit-user-select: none; /* 兼容性：禁止文字选择 */
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
            box-sizing: border-box;
        }

        .header {
            text-align: center;
            margin-bottom: 20px;
            color: black; /* 设置标题文字颜色为白色 */
        }

        .nav {
            margin-bottom: 20px;
        }

        .nav ul {
            list-style-type: none;
            padding: 0;
            margin: 0;
            display: flex;
            justify-content: center;
        }

        .nav li {
            margin-right: 10px;
        }

        .notice {
            border: 2px solid black; /* 设置公告边框颜色为白色 */
            border-radius: 10px;
            padding: 10px;
            margin-bottom: 20px;
            color: black; /* 设置公告文字颜色为白色 */
        }

        .info-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 40px;
        }

        .info-box {
            border: 2px solid black; /* 设置信息框边框颜色为白色 */
            border-radius: 10px;
            padding: 10px;
            width: calc(50% - 20px);
            height: 200px;
            color: black; /* 设置信息框文字颜色为白色 */
        }

        .info-gap {
            width: 20px;
        }

        .extra-info-row {
            display: flex;
            justify-content: space-between;
        }

        .extra-info-box {
            border: 2px solid black; /* 设置信息框边框颜色为白色 */
            border-radius: 10px;
            padding: 10px;
            width: calc(33.33% - 20px);
            height: 200px;
            margin-bottom: 40px;
            color: black; /* 设置信息框文字颜色为白色 */
        }

        .vertical-info-box {
            border: 2px solid black; /* 设置竖排信息框边框颜色为白色 */
            border-radius: 10px;
            padding: 10px;
            width: calc(50% - 20px);
            height: 200px;
            color: black; /* 设置竖排信息框文字颜色为白色 */
        }

        .vertical-info-gap {
            height: 20px;
        }

        .footer {
            text-align: center;
            margin-top: 20px;
            color: black; /* 设置页脚文字颜色为白色 */
        }

        .info-box {
            height: auto;
        }

        .info-column {
            align-items: flex-start;
        }

        .right-align {
            text-align: right;
        }

        a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>安全防火墙</h1>
		<span id="jinrishici-sentence">邵阳市第一中学信息技术社团安全中心已阻止您的访问</span>
    </div>

    <div class="notice">
		<h2>错误描述</h2>
		<p>错误信息：请求可疑。</p>
		<p>错误详情：您的访问设备可疑。</p>
		<p>解决方法：更换设备或者浏览器然后重试，若仍然无法解决，请<a href="https://txc.qq.com/products/648715" target="_blank">点击此处</a>反馈问题。</p>
    <p>Version：Build156</p>
    </div>

</body>
</html>
